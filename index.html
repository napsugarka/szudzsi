<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZUDZSI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="transition-overlay" id="overlay"></div>

    <div class="sun-container">
        <div class="rays-container" id="rays"></div>

        <div class="main-circle">
            <div class="title">SZUDZSI</div>
            
            <div class="mouth-arc">
                <div class="tooth-container">
                    <button class="button" onclick="startTransition('rolam.html')">RÓLAM</button>
                </div>
                <div class="tooth-container">
                    <button class="button" onclick="startTransition('kepek.html')">KÉPEK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const raysContainer = document.getElementById('rays');
        for (let i = 0; i < 8; i++) {
            const angle = i * 45;
            const group = document.createElement('div');
            group.className = 'ray-group';
            // A translate(260px) kitolja a sugarakat az arc szélén túlra
            group.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translate(260px) rotate(90deg)`;
            
            for (let j = 1; j <= 4; j++) {
                const segment = document.createElement('div');
                segment.className = `ray-segment s${j}`;
                group.appendChild(segment);
            }
            raysContainer.appendChild(group);
        }

        function startTransition(url) {
            document.getElementById('rays').classList.add('spinning');
            setTimeout(() => {
                document.getElementById('overlay').classList.add('active');
            }, 400);
            setTimeout(() => { window.location.href = url; }, 1500);
        }
    </script>
</body>
</html>
