<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZUDZSI</title>

    <style>
        body {
            background-color: #E5FCCD;
            margin: 0;
            font-family: Bagel Fat One
        }

        .title {
            position: absolute;
            left: 550px;
            top: 20px;
            font-size: 100px;
            color: #084734;
            font-weight: regular;
            transition: colorChange 2s infinite alternate;
         }
            @keyframes colorChange {
            from {
                color: #084734;
            }
            to {
                color: #CEF17B;
            }
        }
    </style>
</head>
<body>

    <div class="title" id="szoveg">SZUDZSI</div>

    <script>
        let isGreen = true;
        const text = document.getElementById("szoveg");

        setInterval(() => {
            if (isGreen) {
                text.style.color = "#CEF17B";
            } else {
                text.style.color = "#084734";
            }
            isGreen = !isGreen;
        }, 2000);
        /* Fejléc */
        .header {
            position: absolute;
            top: 0;
            left: 300px;
            width: 700px;
            height: 50px;
            background-color: #CEF17B;
            display: flex;
            align-items: center;
            justify-content: center; 
            
       
    </script>

</body>
</html>
