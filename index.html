<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZUDZSI</title>

    <!-- Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #E5FCCD;
            margin: 0;
            font-family: Bagel Fat One;
        }

        /* SZUDZSI szöveg */
        .title {
            position: absolute;
            left: 550px;
            top: 20px;
            font-size: 100px;
            font-weight: regular;
            animation: colorChange 2s infinite alternate;
        }

        /* Színátmenetes animáció */
        @keyframes colorChange {
            from {
                color: #084734;
            }
            to {
                color: #CEF17B;
            }
        }

        /* Fejléc */
        .header {
            position: absolute;
            top: 190px;
            left: 290px;
            width: 900px;
            height: 50px;
            background-color: #CEF17B;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Gomb */
        .button {
            width: 100px;
            height: 30px;
            background-color: #E5FCCD;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bagel Fat One', cursive;
            font-size: 15px;
            color: #084734;
            cursor: pointer;
        }

        .button:hover {
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="title">SZUDZSI</div>

    <div class="header">
        <div class="button">képek</div>
    </div>

</body>
</html>
